server {
    listen 8090;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: client-side routes fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to the API (the "api" service on the Compose network).
    location /api/ {
        proxy_pass http://api:3033/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Swagger UI (and its JSON) served by the API.
    location /docs {
        proxy_pass http://api:3033;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
